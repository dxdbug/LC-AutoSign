name: Milwaukeetool Auto Sign

on:
  schedule:
    - cron: '0 2,7 * * *'  # 🔥 北京时间 10:00、15:00 运行

  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: 校验北京时间（禁止 23:00~07:00）
      run: |
        # 获取当前北京时间小时
        BEIJING_HOUR=$(date -u -d '+8 hours' +'%H')
        echo "当前北京时间：$BEIJING_HOUR 点"
        
        # 核心规则：23点 ~ 次日7点 直接终止任务
        if [ $BEIJING_HOUR -ge 23 ] || [ $BEIJING_HOUR -lt 7 ]; then
          echo "❌ 当前是 23:00~07:00，禁止签到，任务退出"
          exit 1
        else
          echo "✅ 当前时间合规，允许签到"
        fi

    - name: Run Sign Script
      env:
        MILWAUKEETOOL_CLIENT_ID: ${{ secrets.MILWAUKEETOOL_CLIENT_ID }}
        MILWAUKEETOOL_TOKEN_LIST: ${{ secrets.MILWAUKEETOOL_TOKEN_LIST }}
        WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
        DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
      run: |
        python milwaukeetool-sign.py
